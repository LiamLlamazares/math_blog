<div id="comment-sidebar" class="comment-sidebar">
  <button onclick="toggleSidebar()" class="sidebar-toggle">
    <span style="font-size: 1.2em;">💬</span>
  </button>

  <div class="sidebar-content">
    <div class="sidebar-header">
      <h4>Recent Comments</h4> <button onclick="toggleSidebar()" class="close-btn">&times;</button>
    </div>
    
    <ul class="comment-list" id="recent-comments-list">
      <li style="padding: 20px; text-align: center; color: #777;">Loading activity...</li>
    </ul>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    fetch('/_data/recent_comments.json')
      .then(response => response.json())
      .then(data => {
        const list = document.getElementById('recent-comments-list');
        list.innerHTML = '';
        
        const discussions = data.data?.repository?.discussions?.nodes || [];
        if (discussions.length === 0) {
          list.innerHTML = '<li style="padding: 20px; text-align: center; color: #777;">No recent activity.</li>';
          return;
        }

        discussions.forEach(discussion => {
          let baseLink = discussion.url;
          
          // Basic truncation helper
          const truncate = (str, n) => (str.length > n) ? str.slice(0, n-1) + '&hellip;' : str;

          // In a static site, mapping the exact local post URL vs the GitHub discussion title is hard entirely client-side,
          // but we can try to link cleanly using the GitHub discussion URL or a relative path if we parse it.
          // For now, we link to the discussion URL directly.
          
          let comments = discussion.comments?.nodes || [];
          comments.reverse().forEach(comment => {
            const li = document.createElement('li');
            li.className = 'comment-item';
            li.innerHTML = `
              <img src="${comment.author.avatarUrl}" alt="${comment.author.login}" class="comment-avatar">
              <div class="comment-details">
                <div class="meta-line">
                  <span class="comment-author">${comment.author.login}</span>
                  <span class="comment-action">commented on</span>
                </div>
                <a href="${baseLink}#discussioncomment-${comment.databaseId}" target="_blank" class="comment-link">
                  ${truncate(discussion.title, 30)}
                </a>
                <p class="comment-snippet">"${truncate(comment.bodyText, 60)}"</p>
              </div>
            `;
            list.appendChild(li);

            const replies = comment.replies?.nodes || [];
            replies.forEach(reply => {
              const rli = document.createElement('li');
              rli.className = 'comment-item';
              rli.innerHTML = `
                <img src="${reply.author.avatarUrl}" alt="${reply.author.login}" class="comment-avatar">
                <div class="comment-details">
                  <div class="meta-line">
                    <span class="comment-author">${reply.author.login}</span>
                    <span class="comment-action">replied to <strong>${comment.author.login}</strong></span>
                  </div>
                  <a href="${baseLink}#discussioncomment-${reply.databaseId}" target="_blank" class="comment-link">
                    ${truncate(discussion.title, 30)}
                  </a>
                  <p class="comment-snippet">"${truncate(reply.bodyText, 60)}"</p>
                </div>
              `;
              list.appendChild(rli);
            });
          });
        });

        // Re-typeset MathJax for any LaTeX in comment text
        // MathJax.typeset may not process $...$ if Quarto configured \(...\) only.
        // We wait for MathJax startup, then typeset the sidebar element.
        if (window.MathJax) {
          if (window.MathJax.startup && window.MathJax.startup.promise) {
            window.MathJax.startup.promise.then(() => {
              window.MathJax.typesetPromise([list]);
            });
          } else if (window.MathJax.typeset) {
            window.MathJax.typeset([list]);
          }
        }
      })
      .catch(err => {
        console.error("Error loading comments:", err);
        const list = document.getElementById('recent-comments-list');
        list.innerHTML = '<li style="padding: 20px; text-align: center; color: #cc0000;">Failed to load activity.</li>';
      });
  });
</script>

<style>
  /* --- Container --- */
  .comment-sidebar { position: fixed; right: 0; top: 20%; z-index: 9999; display: flex; align-items: flex-start; transform: translateX(320px); transition: transform 0.3s ease; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .comment-sidebar.open { transform: translateX(0); }
  
  /* --- Button --- */
  .sidebar-toggle { background: #008AFF; color: white; border: none; padding: 15px 10px; cursor: pointer; border-radius: 5px 0 0 5px; box-shadow: -2px 2px 5px rgba(0,0,0,0.2); }
  
  /* --- Content Panel --- */
  .sidebar-content { width: 320px; background: #fff; border: 1px solid #ddd; box-shadow: -5px 0 25px rgba(0,0,0,0.15); height: auto; max-height: 80vh; overflow-y: auto; display: flex; flex-direction: column; }
  
  /* --- Header --- */
  .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8f9fa; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  .sidebar-header h4 { margin: 0; font-size: 15px; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 0.5px; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
  
  /* --- List --- */
  .comment-list { list-style: none; padding: 0; margin: 0; }
  
  /* --- Unified Item Style (Flat) --- */
  .comment-item { display: flex; padding: 12px 15px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
  .comment-item:hover { background: #fbfbfb; }
  
  /* --- Avatars --- */
  .comment-avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; border: 1px solid #eee; object-fit: cover; margin-top: 2px; }
  
  /* --- Text Details --- */
  .comment-details { flex: 1; font-size: 13px; line-height: 1.4; overflow: hidden; }
  
  .meta-line { margin-bottom: 2px; font-size: 0.85em; }
  .comment-author { font-weight: 700; color: #333; }
  .comment-action { color: #777; margin-left: 4px; }
  .comment-action strong { color: #555; }
  
  .comment-link { font-weight: 600; color: #008AFF; text-decoration: none; display: block; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .comment-link:hover { text-decoration: underline; }
  
  .comment-snippet { margin: 0; color: #444; display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>

<script>
  function toggleSidebar() {
    document.getElementById('comment-sidebar').classList.toggle('open');
  }
</script>
