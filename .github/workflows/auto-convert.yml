name: Auto-convert PDFs and LaTeX

on:
  push:
    paths:
      - 'posts/**'
      - 'convert_images.py'
      - 'latex2qmd.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf

      - name: Convert PDF Images to SVGs
        run: python convert_images.py
        
      - name: Build Quarto Markdown
        run: python latex2qmd.py . --all

      - name: Commit and Push changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add posts/
          # Only commit if there are changes to avoid empty commits
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-generated SVGs and Markdown from LaTeX" && git push)
